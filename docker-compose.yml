services:
  postgres:
    image: postgres:17-alpine
    container_name: esbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: esbot_edulab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - esbot-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: esbot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - esbot-redis-data:/data

volumes:
  esbot-postgres-data:
  esbot-redis-data:
